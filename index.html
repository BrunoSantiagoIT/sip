<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIP Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* ════════════════════════════════════════════ */
        /* ЭКРАН ВХОДА */
        /* ════════════════════════════════════════════ */
        
        #login-screen {
            background: rgba(22, 33, 62, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(100, 200, 255, 0.2);
        }
        
        #login-screen.hidden {
            display: none;
        }
        
        .login-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header h1 {
            font-size: 32px;
            color: #64c8ff;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.3);
        }
        
        .login-header p {
            color: #a0a0a0;
            font-size: 14px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .form-group label {
            color: #64c8ff;
            font-size: 14px;
            font-weight: 500;
        }
        
        .form-group input {
            padding: 12px 15px;
            background: rgba(100, 200, 255, 0.1);
            border: 2px solid rgba(100, 200, 255, 0.3);
            border-radius: 8px;
            color: #ffffff;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #64c8ff;
            background: rgba(100, 200, 255, 0.15);
            box-shadow: 0 0 10px rgba(100, 200, 255, 0.2);
        }
        
        .login-btn {
            padding: 12px;
            background: linear-gradient(135deg, #64c8ff 0%, #00d4ff 100%);
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(100, 200, 255, 0.3);
        }
        
        .login-btn:active {
            transform: translateY(0);
        }
        
        .error-message {
            color: #ff6b6b;
            font-size: 14px;
            text-align: center;
            display: none;
            padding: 10px;
            background: rgba(255, 107, 107, 0.1);
            border-radius: 6px;
            border: 1px solid rgba(255, 107, 107, 0.3);
        }
        
        .error-message.show {
            display: block;
        }
        
        /* ════════════════════════════════════════════ */
        /* ОСНОВНОЙ ДАШБОРД */
        /* ════════════════════════════════════════════ */
        
        #dashboard {
            width: 100%;
            display: none;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
        }
        
        #dashboard.visible {
            display: flex;
            flex-direction: column;
        }
        
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(22, 33, 62, 0.9);
            border-bottom: 2px solid rgba(100, 200, 255, 0.2);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        
        .dashboard-header h1 {
            color: #64c8ff;
            font-size: 24px;
        }
        
        .logout-btn {
            padding: 8px 16px;
            background: rgba(255, 100, 100, 0.2);
            border: 1px solid #ff6464;
            color: #ff6464;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }
        
        .logout-btn:hover {
            background: rgba(255, 100, 100, 0.3);
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            width: 100%;
            flex: 1;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid rgba(100, 200, 255, 0.2);
            overflow-x: auto;
            padding-bottom: 10px;
        }
        
        .tab-btn {
            padding: 10px 20px;
            background: rgba(100, 200, 255, 0.1);
            border: 1px solid rgba(100, 200, 255, 0.3);
            color: #64c8ff;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            font-weight: 500;
        }
        
        .tab-btn:hover {
            background: rgba(100, 200, 255, 0.2);
        }
        
        .tab-btn.active {
            background: linear-gradient(135deg, #64c8ff 0%, #00d4ff 100%);
            color: #000;
            border-color: #64c8ff;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(100, 200, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(100, 200, 255, 0.3);
            color: #64c8ff;
            transition: all 0.3s;
        }
        
        .stat-card:hover {
            background: rgba(100, 200, 255, 0.15);
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(100, 200, 255, 0.2);
        }
        
        .stat-label {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: bold;
        }
        
        .note-card {
            background: rgba(100, 200, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(100, 200, 255, 0.3);
            color: #64c8ff;
            margin-bottom: 15px;
            transition: all 0.3s;
        }
        
        .note-card:hover {
            background: rgba(100, 200, 255, 0.15);
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(100, 200, 255, 0.2);
        }
        
        .note-card h3 {
            font-size: 18px;
            margin-bottom: 12px;
            color: #00d4ff;
        }
        
        .note-stat {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(100, 200, 255, 0.2);
            font-size: 14px;
        }
        
        .note-stat:last-child {
            border-bottom: none;
        }
        
        .status-good {
            color: #64ff64;
        }
        
        .status-warn {
            color: #ffff64;
        }
        
        .status-bad {
            color: #ff6464;
        }
        
        .last-updated {
            text-align: center;
            color: #606060;
            font-size: 12px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(100, 200, 255, 0.2);
        }
        
        .table-responsive {
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(100, 200, 255, 0.2);
            color: #64c8ff;
        }
        
        th {
            background: rgba(100, 200, 255, 0.15);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
        }
        
        tr:hover {
            background: rgba(100, 200, 255, 0.1);
        }
    </style>
</head>
<body>
    <!-- ЭКРАН ВХОДА -->
    <div id="login-screen">
        <div class="login-container">
            <div class="login-header">
                <h1>🔐 SIP Dashboard</h1>
                <p>Введите пароль для доступа</p>
            </div>
            
            <div class="error-message" id="error-msg"></div>
            
            <div class="form-group">
                <label for="password">Пароль:</label>
                <input 
                    type="password" 
                    id="password" 
                    placeholder="••••••••"
                    autocomplete="off"
                >
            </div>
            
            <button class="login-btn" onclick="handleLogin()">Войти</button>
            
            <div style="text-align: center; color: #606060; font-size: 12px; margin-top: 20px;">
                SIP Dashboard v8.0 • Приватная система
            </div>
        </div>
    </div>
    
    <!-- ОСНОВНОЙ ДАШБОРД -->
    <div id="dashboard">
        <div class="dashboard-header">
            <div>
                <h1>📊 SIP Dashboard</h1>
            </div>
            <button class="logout-btn" onclick="handleLogout()">🚪 Выход</button>
        </div>
        
        <div class="container">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('overview')">📊 Обзор</button>
                <button class="tab-btn" onclick="switchTab('sips')">📞 SIP</button>
                <button class="tab-btn" onclick="switchTab('notes')">📝 Примечания</button>
                <button class="tab-btn" onclick="switchTab('team')">👥 Команда</button>
                <button class="tab-btn" onclick="switchTab('suppliers')">🏢 Поставщики</button>
                <button class="tab-btn" onclick="switchTab('problems')">🚨 Проблемы</button>
            </div>
            
            <!-- ОБЗОР -->
            <div id="overview" class="tab-content active">
                <h2 style="color: #64c8ff; margin-bottom: 20px;">📊 Обзор системы</h2>
                <div class="stat-grid" id="overview-stats"></div>
            </div>
            
            <!-- SIP -->
            <div id="sips" class="tab-content">
                <h2 style="color: #64c8ff; margin-bottom: 20px;">📞 SIP аккаунты</h2>
                <div class="table-responsive" id="sips-table"></div>
            </div>
            
            <!-- ПРИМЕЧАНИЯ -->
            <div id="notes" class="tab-content">
                <h2 style="color: #64c8ff; margin-bottom: 20px;">📝 Примечания (Работники)</h2>
                <div id="notes-list"></div>
            </div>
            
            <!-- КОМАНДА -->
            <div id="team" class="tab-content">
                <h2 style="color: #64c8ff; margin-bottom: 20px;">👥 Команда</h2>
                <div class="table-responsive" id="team-table"></div>
            </div>
            
            <!-- ПОСТАВЩИКИ -->
            <div id="suppliers" class="tab-content">
                <h2 style="color: #64c8ff; margin-bottom: 20px;">🏢 Поставщики</h2>
                <div class="table-responsive" id="suppliers-table"></div>
            </div>
            
            <!-- ПРОБЛЕМЫ -->
            <div id="problems" class="tab-content">
                <h2 style="color: #64c8ff; margin-bottom: 20px;">🚨 Проблемы</h2>
                <div class="table-responsive" id="problems-table"></div>
            </div>
            
            <div class="last-updated" id="last-updated"></div>
        </div>
    </div>

    <script>
        // ════════════════════════════════════════════
        // КОНФИГУРАЦИЯ
        // ════════════════════════════════════════════
        
        const DASHBOARD_PASSWORD = "2244";
        const SESSION_KEY = "sip_dashboard_auth";
        const SESSION_TIMEOUT = 24 * 60 * 60 * 1000; // 24 часа
        
        // ════════════════════════════════════════════
        // ФУНКЦИИ АУТЕНТИФИКАЦИИ
        // ════════════════════════════════════════════
        
        function handleLogin() {
            const password = document.getElementById("password").value;
            const errorMsg = document.getElementById("error-msg");
            
            if (!password) {
                showError("Введите пароль");
                return;
            }
            
            if (password === DASHBOARD_PASSWORD) {
                const authData = {
                    authenticated: true,
                    timestamp: Date.now()
                };
                localStorage.setItem(SESSION_KEY, JSON.stringify(authData));
                showDashboard();
                loadDashboardData();
            } else {
                showError("❌ Неверный пароль");
                document.getElementById("password").value = "";
            }
        }
        
        function handleLogout() {
            localStorage.removeItem(SESSION_KEY);
            location.reload();
        }
        
        function showError(message) {
            const errorMsg = document.getElementById("error-msg");
            errorMsg.textContent = message;
            errorMsg.classList.add("show");
            
            setTimeout(() => {
                errorMsg.classList.remove("show");
            }, 3000);
        }
        
        function isAuthenticated() {
            const authData = localStorage.getItem(SESSION_KEY);
            if (!authData) return false;
            
            try {
                const data = JSON.parse(authData);
                const now = Date.now();
                
                if (now - data.timestamp > SESSION_TIMEOUT) {
                    localStorage.removeItem(SESSION_KEY);
                    return false;
                }
                
                return data.authenticated === true;
            } catch (e) {
                return false;
            }
        }
        
        function showDashboard() {
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("dashboard").classList.add("visible");
        }
        
        function showLoginScreen() {
            document.getElementById("login-screen").classList.remove("hidden");
            document.getElementById("dashboard").classList.remove("visible");
        }
        
        // ════════════════════════════════════════════
        // ФУНКЦИИ ВКЛАДОК
        // ════════════════════════════════════════════
        
        function switchTab(tabName) {
            // Скрываем все вкладки
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // Убираем активный класс с кнопок
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Показываем выбранную вкладку
            document.getElementById(tabName).classList.add('active');
            
            // Добавляем активный класс кнопке
            event.target.classList.add('active');
        }
        
        // ════════════════════════════════════════════
        // ЗАГРУЗКА И ОТОБРАЖЕНИЕ ДАННЫХ
        // ════════════════════════════════════════════
        
        async function loadDashboardData() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                
                renderOverview(data);
                renderSips(data);
                renderNotes(data);
                renderTeam(data);
                renderSuppliers(data);
                renderProblems(data);
                
                updateLastUpdated(data._meta?.updated_at);
            } catch (error) {
                console.error('Ошибка загрузки данных:', error);
            }
        }
        
        function renderOverview(data) {
            const stats = document.getElementById("overview-stats");
            
            const freeSips = Object.values(data.sips || {}).filter(s => !s.assigned_to && !s.multisip).length;
            const busySips = Object.values(data.sips || {}).filter(s => s.assigned_to && !s.multisip).length;
            const multiSips = Object.values(data.sips || {}).filter(s => s.multisip).length;
            const openProblems = Object.values(data.problems || {}).filter(p => p.status === 'open').length;
            const closedProblems = Object.values(data.problems || {}).filter(p => p.status === 'closed').length;
            const notes = Object.keys(data.notes || {}).length;
            
            const avgRating = data.ratings?.length > 0 
                ? (data.ratings.reduce((sum, r) => sum + r.rating, 0) / data.ratings.length).toFixed(1)
                : 'N/A';
            
            stats.innerHTML = `
                <div class="stat-card">
                    <div class="stat-label">🟢 Свободных SIP</div>
                    <div class="stat-value">${freeSips}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">🔴 Занятых SIP</div>
                    <div class="stat-value">${busySips}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">🔀 Мультисип</div>
                    <div class="stat-value">${multiSips}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">🚨 Открытых проблем</div>
                    <div class="stat-value">${openProblems}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">✅ Закрытых проблем</div>
                    <div class="stat-value">${closedProblems}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">📝 Примечаний</div>
                    <div class="stat-value">${notes}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">⭐ Средняя оценка</div>
                    <div class="stat-value">${avgRating}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">🏢 Поставщиков</div>
                    <div class="stat-value">${Object.keys(data.suppliers || {}).length}</div>
                </div>
            `;
        }
        
        function renderSips(data) {
            const table = document.getElementById("sips-table");
            
            const sipsArray = Object.values(data.sips || {}).sort((a, b) => 
                (a.number || '').localeCompare(b.number || '')
            );
            
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>📞 Номер</th>
                            <th>🏢 Поставщик</th>
                            <th>Тип</th>
                            <th>Статус</th>
                            <th>За кем</th>
                            <th>Категория</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            sipsArray.forEach(sip => {
                const supplier = data.suppliers?.[sip.supplier_id];
                const status = sip.assigned_to ? '🔴 Занят' : '🟢 Свободен';
                const type = sip.multisip ? '🔀 Мульти' : '📞 Обычный';
                const catIcon = {
                    'холодка': '📞',
                    'госы': '🏛',
                    'входяшка': '📥'
                }[sip.category] || '📞';
                
                html += `
                    <tr>
                        <td><strong>${sip.number}</strong></td>
                        <td>${supplier?.name || '?'}</td>
                        <td>${type}</td>
                        <td>${status}</td>
                        <td>${sip.assigned_to || '—'}</td>
                        <td>${catIcon} ${sip.category}</td>
                    </tr>
                `;
            });
            
            html += '</tbody></table>';
            table.innerHTML = html;
        }
        
        function renderNotes(data) {
            const notesList = document.getElementById("notes-list");
            
            if (!data.notes || Object.keys(data.notes).length === 0) {
                notesList.innerHTML = '<p style="color: #a0a0a0;">Примечания не найдены</p>';
                return;
            }
            
            let html = '';
            
            Object.values(data.notes).sort((a, b) => 
                (b.last_active || 0) - (a.last_active || 0)
            ).forEach(note => {
                const lastActiveDate = new Date(note.last_active * 1000).toLocaleString('ru-RU');
                const statusColor = note.problems_total <= 5 ? 'status-good' : 
                                   note.problems_total <= 10 ? 'status-warn' : 'status-bad';
                
                html += `
                    <div class="note-card">
                        <h3>👤 ${note.display}</h3>
                        <div class="note-stat">
                            <span>📞 Текущие SIP:</span>
                            <strong>${note.sip_numbers?.join(', ') || '—'}</strong>
                        </div>
                        <div class="note-stat">
                            <span>🚨 Проблем всего:</span>
                            <strong class="${statusColor}">${note.problems_total}</strong>
                        </div>
                        <div class="note-stat">
                            <span>📅 Проблем сегодня:</span>
                            <strong>${note.problems_today}</strong>
                        </div>
                        <div class="note-stat">
                            <span>⏰ Последняя активность:</span>
                            <strong>${lastActiveDate}</strong>
                        </div>
                    </div>
                `;
            });
            
            notesList.innerHTML = html;
        }
        
        function renderTeam(data) {
            const table = document.getElementById("team-table");
            
            let teamData = {};
            
            // Собираем данные из проблем и примечаний
            Object.values(data.problems || {}).forEach(problem => {
                if (!teamData[problem.user_name]) {
                    teamData[problem.user_name] = {
                        name: problem.user_name,
                        tg: problem.user_tg || '—',
                        problems: 0,
                        rating: 0
                    };
                }
                teamData[problem.user_name].problems++;
            });
            
            // Добавляем оценки
            data.ratings?.forEach(rating => {
                const userName = Object.values(data.problems || {})
                    .find(p => p.user_id === rating.user_id)?.user_name;
                if (userName && teamData[userName]) {
                    teamData[userName].rating = Math.max(teamData[userName].rating, rating.rating);
                }
            });
            
            const teamArray = Object.values(teamData).sort((a, b) => a.problems - b.problems);
            
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>👤 Имя</th>
                            <th>@Username</th>
                            <th>🚨 Проблем</th>
                            <th>⭐ Оценка</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            teamArray.forEach((member, index) => {
                const stars = '⭐'.repeat(member.rating) + '☆'.repeat(5 - member.rating);
                html += `
                    <tr>
                        <td><strong>${index + 1}. ${member.name}</strong></td>
                        <td>@${member.tg}</td>
                        <td>${member.problems}</td>
                        <td>${stars}</td>
                    </tr>
                `;
            });
            
            html += '</tbody></table>';
            table.innerHTML = html;
        }
        
        function renderSuppliers(data) {
            const table = document.getElementById("suppliers-table");
            
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>🏢 Поставщик</th>
                            <th>📞 SIP</th>
                            <th>🚨 Проблем</th>
                            <th>📊 Индекс</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            const problemsBySup = {};
            Object.values(data.problems || {}).forEach(p => {
                problemsBySup[p.supplier_name] = (problemsBySup[p.supplier_name] || 0) + 1;
            });
            
            Object.values(data.suppliers || {}).forEach(sup => {
                const sipCount = Object.values(data.sips || {})
                    .filter(s => s.supplier_id === sup.id).length;
                const problemCount = problemsBySup[sup.name] || 0;
                const index = sipCount > 0 ? (problemCount / sipCount).toFixed(2) : 0;
                const status = index <= 0.8 ? '🟢' : index <= 1.2 ? '🟡' : '🔴';
                
                html += `
                    <tr>
                        <td><strong>${sup.name}</strong></td>
                        <td>${sipCount}</td>
                        <td>${problemCount}</td>
                        <td>${status} ${index}</td>
                    </tr>
                `;
            });
            
            html += '</tbody></table>';
            table.innerHTML = html;
        }
        
        function renderProblems(data) {
            const table = document.getElementById("problems-table");
            
            const problemsArray = Object.values(data.problems || {})
                .sort((a, b) => (b.created_at || 0) - (a.created_at || 0))
                .slice(0, 50); // Последние 50
            
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>👤 Пользователь</th>
                            <th>📞 SIP</th>
                            <th>🏢 Поставщик</th>
                            <th>📝 Описание</th>
                            <th>Статус</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            problemsArray.forEach(problem => {
                const status = problem.status === 'open' ? '🔴 Открыта' : '✅ Закрыта';
                html += `
                    <tr>
                        <td>#${problem.id}</td>
                        <td>${problem.display_name}</td>
                        <td>${problem.sip_number}</td>
                        <td>${problem.supplier_name}</td>
                        <td>${problem.text?.substring(0, 50)}...</td>
                        <td>${status}</td>
                    </tr>
                `;
            });
            
            html += '</tbody></table>';
            table.innerHTML = html;
        }
        
        function updateLastUpdated(timestamp) {
            document.getElementById("last-updated").textContent = 
                `Обновлено: ${timestamp || 'N/A'}`;
        }
        
        // ════════════════════════════════════════════
        // ИНИЦИАЛИЗАЦИЯ
        // ════════════════════════════════════════════
        
        window.addEventListener('load', () => {
            if (isAuthenticated()) {
                showDashboard();
                loadDashboardData();
            } else {
                showLoginScreen();
                setTimeout(() => {
                    document.getElementById("password").focus();
                }, 100);
            }
        });
        
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const password = document.getElementById("password");
                if (password && document.activeElement === password) {
                    handleLogin();
                }
            }
        });
        
        // Автообновление каждые 30 секунд
        setInterval(() => {
            if (isAuthenticated()) {
                loadDashboardData();
            }
        }, 30000);
    </script>
</body>
</html>
